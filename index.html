<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo OS - Alec's Multi-Universe Journal</title>
    <style>
        :root {
            --desk-bg: #d9cec1; --paper-right: #fdfaf5; --paper-left: #f5f0e6; 
            --paper-line: #f0e6d3; --grid-line: #e3d9cd;
            --text-dark: #3a2f29; --text-light: #8a7b71;
            --accent-red: #c96554; --accent-blue: #6b8cce; --leather-cover: #5c4332; 
            --tape-color: rgba(230, 200, 180, 0.7);
        }

        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: var(--desk-bg); font-family: "PingFang SC", "Microsoft YaHei", serif; color: var(--text-dark); overflow: hidden; }

        /* ====== 左上角：多重宇宙图书馆控制台 ====== */
        .library-sidebar { position: fixed; top: 20px; left: 20px; background: rgba(255,255,255,0.7); backdrop-filter: blur(15px); padding: 15px 20px; border-radius: 12px; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-height: 90vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.5); width: 220px; transition: 0.3s;}
        .lib-row { margin-bottom: 15px; border-bottom: 1px dashed rgba(0,0,0,0.1); padding-bottom: 10px;}
        .lib-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .lib-icon { font-size: 16px; user-select: none; }
        .lib-name-input { flex: 1; background: transparent; border: none; border-bottom: 1px solid transparent; font-size: 14px; font-weight: bold; color: var(--text-dark); outline: none; transition: 0.2s;}
        .lib-name-input:focus, .lib-name-input:hover { border-color: var(--accent-red); background: rgba(255,255,255,0.5); }
        .lib-books { display: flex; gap: 6px; flex-wrap: wrap; align-items: center;}
        .lib-book-badge { background: rgba(0,0,0,0.08); color: var(--text-dark); padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: 0.2s; font-weight: bold;}
        .lib-book-badge:hover { background: rgba(0,0,0,0.15); }
        .lib-book-badge.active-book { background: var(--text-dark); color: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .lib-add-btn { background: transparent; color: var(--text-light); padding: 2px 6px; border-radius: 4px; font-size: 14px; cursor: pointer; font-weight: bold;}
        .lib-add-btn:hover { color: var(--text-dark); background: rgba(0,0,0,0.05);}
        .lib-add-journal-btn { width: 100%; text-align: center; padding: 10px 0; background: rgba(0,0,0,0.03); border-radius: 8px; cursor: pointer; font-size: 12px; color: var(--text-light); font-weight: bold; transition: 0.2s; box-sizing: border-box;}
        .lib-add-journal-btn:hover { background: rgba(0,0,0,0.08); color: var(--text-dark);}

        /* 密码锁 */
        .lock-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(217, 206, 193, 0.75); backdrop-filter: blur(20px); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.6s ease, visibility 0.6s; }
        .lock-title { font-size: 28px; font-weight: bold; color: var(--text-dark); margin-bottom: 8px; letter-spacing: 4px; font-family: sans-serif;}
        .lock-subtitle { font-size: 13px; color: var(--text-light); margin-bottom: 30px; letter-spacing: 1px;}
        .password-input { background: rgba(255,255,255,0.6); border: 2px solid var(--text-light); border-radius: 12px; padding: 15px 20px; font-size: 20px; text-align: center; color: var(--text-dark); outline: none; width: 220px; letter-spacing: 8px; font-family: monospace; transition: 0.2s;}
        .password-input:focus { border-color: var(--accent-blue); background: #fff;}
        .unlock-btn { margin-top: 25px; background: var(--text-dark); color: #fff; border: none; padding: 12px 40px; border-radius: 25px; font-size: 14px; cursor: pointer; transition: 0.2s; font-weight: bold; letter-spacing: 2px;}
        .unlock-btn:hover { background: var(--accent-blue); transform: translateY(-2px);}
        .shake { animation: shake 0.4s; border-color: var(--accent-red) !important; color: var(--accent-red);}
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-6px); } 50% { transform: translateX(6px); } 75% { transform: translateX(-6px); } 100% { transform: translateX(0); } }

        /* ====== 底部巨型贴纸控制台 ====== */
        .sticker-toggle-btn { position: fixed; bottom: 30px; right: 40px; background: var(--text-dark); color: #fff; padding: 12px 25px; border-radius: 25px; font-size: 15px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000; font-weight: bold; transition: 0.2s;}
        .sticker-toggle-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }

        .sticker-tray { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 700px; background: rgba(255,255,255,0.95); backdrop-filter: blur(15px); padding: 25px 30px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); display: none; gap: 30px; z-index: 1000; border: 1px solid rgba(0,0,0,0.05); justify-content: center; align-items: center; box-sizing: border-box;}
        .tray-item { font-size: 45px; cursor: pointer; user-select: none; transition: 0.2s; display: flex; justify-content: center; align-items: center; width: 60px; height: 60px;}
        .tray-item:hover { transform: scale(1.2) translateY(-5px) rotate(5deg); }

        .journal-container { position: relative; width: 950px; height: 600px; transition: all 0.6s ease; }
        
        .bookmarks { position: absolute; top: 50px; display: flex; flex-direction: column; gap: 4px; z-index: 10; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); right: 20px; transform: translateX(100%); }
        .journal-opened .bookmarks { right: auto; left: 10px; transform: translateX(-100%); }
        .bm-year { background: var(--text-dark); color: #fff; padding: 8px 10px 8px 20px; border-radius: 0 10px 10px 0; font-weight: bold; font-size: 16px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); margin-bottom: 5px; text-align: center; }
        .journal-opened .bm-year { border-radius: 10px 0 0 10px; padding: 8px 20px 8px 10px; box-shadow: -2px 2px 5px rgba(0,0,0,0.1); }
        .bm-month { background: #e6dace; color: var(--text-light); padding: 6px 20px 6px 10px; border-radius: 0 8px 8px 0; font-size: 13px; font-weight: bold; cursor: pointer; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); transition: 0.2s; margin-right: 10px; text-align: right; }
        .journal-opened .bm-month { border-radius: 8px 0 0 8px; padding: 6px 10px 6px 20px; margin-right: 0; margin-left: 10px; text-align: left; }
        .bm-month:hover { background: #dcd0c3; }
        .bm-month.active { background: var(--accent-red); color: #fff; margin-right: 0; }
        .journal-opened .bm-month.active { margin-left: 0; }

        .bookmarks-right { position: absolute; top: 70px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 9; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; pointer-events: none;}
        .journal-opened .bookmarks-right { right: -30px; opacity: 1; pointer-events: auto;}
        .bm-add { background: var(--text-dark); color: #fff; padding: 15px 10px 15px 15px; border-radius: 0 10px 10px 0; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); transition: 0.2s; writing-mode: vertical-rl; letter-spacing: 2px;}
        .bm-add:hover { background: var(--accent-red); transform: translateX(5px);}

        .bookmark-top { position: absolute; top: -25px; right: 120px; background: var(--accent-blue); color: #fff; padding: 8px 20px 25px 20px; border-radius: 5px 5px 0 0; font-size: 13px; font-weight: bold; cursor: pointer; z-index: 10; opacity: 0; transition: 0.2s; }
        .journal-opened .bookmark-top { opacity: 1; }
        .bookmark-top:hover { top: -35px; }

        .journal-cover { position: absolute; left: 50%; top: 0; bottom: 0; width: 475px; background: var(--leather-cover); border-radius: 5px 20px 20px 5px; box-shadow: 15px 15px 30px rgba(0,0,0,0.3); display: flex; flex-direction: column; justify-content: center; align-items: center; color: #d4c3b3; z-index: 50; cursor: pointer; transform-origin: left center; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .journal-cover::before { content: ''; position: absolute; left: 15px; top: 0; bottom: 0; width: 4px; background: rgba(0,0,0,0.2); }
        .cover-title { font-size: 32px; font-weight: bold; letter-spacing: 5px; border-bottom: 2px solid #d4c3b3; padding-bottom: 10px; margin-bottom: 20px;}
        
        .journal-inner { position: absolute; top: 10px; left: 0; right: 0; bottom: 10px; background: var(--paper-right); border-radius: 10px; box-shadow: 5px 5px 20px rgba(0,0,0,0.1); display: flex; opacity: 0; pointer-events: none; transition: opacity 0.3s ease 0.3s; overflow: hidden; box-sizing: border-box; }
        .journal-inner::after { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 40px; transform: translateX(-50%); background: linear-gradient(to right, rgba(0,0,0,0.02) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.02) 100%); z-index: 5; pointer-events: none; }

        /* 左页 */
        .page-left { flex: 1; height: 100%; padding: 30px 40px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: var(--paper-left); background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px); background-size: 20px 20px; z-index: 1; box-sizing: border-box;}
        .close-book-btn { position: absolute; top: 15px; left: 20px; font-size: 13px; font-weight: bold; color: var(--text-light); cursor: pointer; z-index: 50; }
        
        .scrapbook-note { font-family: cursive, "PingFang SC"; font-size: 14px; color: var(--text-dark); line-height: 1.6; text-align: center; padding: 10px 15px; width: 80%; max-height: 90px; overflow-y: auto; background: rgba(255,255,255,0.6); border-radius: 8px; box-shadow: 2px 2px 5px rgba(0,0,0,0.02); cursor: context-menu; position: relative; transition: 0.2s; box-sizing: border-box;}
        .scrapbook-note::-webkit-scrollbar { display: none; }
        .scrapbook-note::before { content: '右键编辑'; position: absolute; top: 2px; right: 5px; font-size: 9px; color: var(--text-light); opacity: 0; transition: 0.2s; font-family: sans-serif; }
        .scrapbook-note:hover::before { opacity: 1; }
        .note-edit-area { width: 80%; height: 90px; font-family: cursive, "PingFang SC"; font-size: 14px; line-height: 1.6; padding: 10px; border: 2px dashed var(--accent-red); border-radius: 8px; background: #fff; outline: none; resize: none; text-align: center; box-sizing: border-box;}

        .media-center { display: flex; flex-direction: column; align-items: center; margin: 15px 0; position: relative; flex-shrink: 0; }
        .tape { position: absolute; top: -10px; left: 20px; width: 60px; height: 20px; background: var(--tape-color); transform: rotate(-3deg); z-index: 10; }
        .polaroid-frame { width: 200px; height: 240px; background: #fff; padding: 12px 12px 35px 12px; box-shadow: 2px 5px 15px rgba(0,0,0,0.1); transform: rotate(-1deg); display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; box-sizing: border-box; overflow: hidden;}
        .polaroid-image { width: 100%; height: 100%; background-color: #eaeaea; background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; border: 1px solid #eee; color: #aaa; font-size: 12px; text-align: center; }

        .music-player-widget { position: absolute; width: 210px; background: rgba(255,255,255,0.9); border-radius: 12px; padding: 10px 15px; box-shadow: 2px 5px 15px rgba(0,0,0,0.15); z-index: 45; border: 1px solid #ddd; backdrop-filter: blur(5px); display: none; flex-direction: column; gap: 6px; box-sizing: border-box; cursor: move; }
        .music-header { display: flex; align-items: center; gap: 5px; }
        .music-input { flex: 1; border: none; background: transparent; border-bottom: 1px dashed #ccc; font-size: 11px; color: var(--text-dark); outline: none; text-align: left; padding-bottom: 2px;}
        .upload-music-btn { background: var(--text-light); color: #fff; border: none; border-radius: 4px; padding: 2px 5px; font-size: 10px; cursor: pointer;}
        .music-controls { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        .play-btn { width: 26px; height: 26px; border-radius: 50%; background: var(--text-dark); color: #fff; border: none; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 11px;}
        .close-music-btn { position: absolute; top: -6px; right: -6px; background: var(--accent-red); color: #fff; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .add-music-btn { margin-top: 15px; width: 40px; height: 40px; background: rgba(255,255,255,0.7); border: 2px dashed var(--text-light); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; color: var(--text-light); cursor: pointer; transition: 0.2s; }

        /* 右页 */
        .page-right { flex: 1; height: 100%; padding: 30px 40px; display: flex; flex-direction: column; background-image: linear-gradient(var(--paper-line) 1px, transparent 1px); background-size: 100% 32px; background-position: 0 45px; z-index: 10; box-sizing: border-box; }
        .page-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--text-dark); padding-bottom: 8px; margin-bottom: 15px; flex-shrink: 0;}
        
        .seamless-input { border: 1px dashed transparent; background: transparent; font-size: 15px; font-weight: bold; color: var(--text-dark); outline: none; transition: 0.2s; padding: 2px 5px; font-family: inherit;}
        .seamless-input:hover, .seamless-input:focus { border-color: rgba(0,0,0,0.1); background: rgba(255,255,255,0.5); border-radius: 4px; }
        .seamless-textarea { width: 100%; height: 100%; border: 1px dashed transparent; background: transparent; font-size: 14px; line-height: 2.1; color: var(--text-dark); outline: none; resize: none; font-family: inherit; padding: 5px; text-indent: 2em; box-sizing: border-box;}
        .seamless-textarea:hover, .seamless-textarea:focus { border-color: rgba(0,0,0,0.1); background: rgba(255,255,255,0.5); border-radius: 8px;}

        .agent-box { height: 140px; margin-bottom: 10px; padding: 5px; border-radius: 8px; box-sizing: border-box; background-color: rgba(255,255,255,0.3); display: flex; flex-direction: column;}
        
        .user-section-wrapper { height: 200px; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 8px; box-sizing: border-box; background-color: rgba(255,255,255,0.4); }
        .user-section-wrapper::-webkit-scrollbar { width: 4px; }
        .user-section-wrapper::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }
        .sealed-entry { background: rgba(107,140,206,0.06); border-left: 3px solid var(--accent-blue); padding: 8px 12px; margin-bottom: 10px; border-radius: 0 8px 8px 0; }
        .sealed-text { font-size: 13px; color: var(--text-dark); line-height: 1.5; word-break: break-all; }
        .sealed-time { font-size: 10px; color: var(--text-light); text-align: right; margin-top: 4px; font-family: monospace; }
        .user-input { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.7); border: 1px dashed rgba(0,0,0,0.15); border-radius: 8px; padding: 10px 12px 35px 12px; font-size: 13px; color: var(--accent-blue); resize: none; outline: none; line-height: 1.5; min-height: 70px; margin-top: 10px;}
        .save-btn { float: right; margin-top: -30px; margin-right: 8px; background: var(--accent-blue); color: #fff; border: none; padding: 4px 12px; border-radius: 12px; font-size: 11px; cursor: pointer; position: relative; z-index: 10;}

        /* 翻页与删除 */
        .page-controls { display: flex; justify-content: space-between; align-items: center; margin-top: auto; font-size: 13px; color: var(--text-light); border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 12px; flex-shrink: 0; }
        .nav-btn { cursor: pointer; padding: 5px 10px; border-radius: 5px; font-weight: bold; }
        .nav-btn.disabled { opacity: 0.3; pointer-events: none; }
        .delete-page-btn { cursor: pointer; color: var(--text-light); font-size: 14px; transition: 0.2s; padding: 5px; border-radius: 4px;}
        .delete-page-btn:hover { color: var(--accent-red); background: rgba(0,0,0,0.05);}

        .draggable-sticker { position: absolute; cursor: move; user-select: none; z-index: 50; display: inline-block; padding: 10px; }
        .sticker-content { pointer-events: none; }
        .sticker-ctrls { position: absolute; top: -15px; right: -15px; background: #fff; border-radius: 20px; padding: 2px 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); display: none; gap: 5px; z-index: 51; border: 1px solid #ddd;}
        .draggable-sticker:hover .sticker-ctrls { display: flex; }
        .s-ctrl-btn { border: none; background: transparent; font-size: 12px; cursor: pointer; padding: 2px 4px; border-radius: 4px; }
        .s-ctrl-del { color: red; font-weight: bold;}
        
        .search-modal { position: absolute; top: 10px; right: 120px; background: #fff; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); padding: 12px; display: none; z-index: 100; border: 1px solid #eee;}
        .search-inner { display: flex; gap: 8px; }
        .search-modal input { border: 1px solid #ddd; padding: 8px 12px; border-radius: 6px; outline: none; font-size: 13px; width: 160px; }
        .search-action-btn { background: var(--accent-blue); color: #fff; border: none; padding: 0 15px; border-radius: 6px; font-size: 13px; cursor: pointer; }

        body.journal-opened .journal-cover { transform: rotateY(-180deg); opacity: 0; pointer-events: none; }
        body.journal-opened .journal-inner { opacity: 1; pointer-events: auto; }
        body:not(.journal-opened) .journal-container { transform: translateX(-150px); }
        body.journal-opened .journal-container { transform: translateX(50px); }
    </style>
</head>
<body>

<div class="lock-screen" id="lock-screen">
    <div class="lock-title">Echo OS</div>
    <div class="lock-subtitle">系统访问受限，请验证权限。</div>
    <input type="password" class="password-input" id="os-password" placeholder="PIN" onkeypress="handlePasswordEnter(event)">
    <button class="unlock-btn" onclick="checkPassword()">解锁进入系统</button>
</div>

<div class="library-sidebar" id="library-container">
    </div>

<div class="sticker-toggle-btn" onclick="toggleTray()">✨ 贴纸工作台</div>

<div class="sticker-tray" id="sticker-tray">
    <div class="tray-item" onclick="spawnSticker('🌸')">🌸</div>
    <div class="tray-item" onclick="spawnSticker('⭐')">⭐</div>
    <div class="tray-item" onclick="spawnSticker('📌')">📌</div>
    <div class="tray-item" onclick="spawnSticker('🎀')">🎀</div>
    <div class="tray-item" onclick="spawnSticker('☕')">☕</div>
    <div class="tray-item" onclick="spawnSticker('📝')">📝</div>
    <div class="tray-item" onclick="spawnSticker('📸')">📸</div>
</div>

<div class="journal-container">
    <div class="bookmarks" id="bookmark-list">
        <div class="bm-year" id="display-bm-year">2026</div>
        <div class="bm-month" onclick="jumpToMonth(12, this)">12月</div>
        <div class="bm-month" onclick="jumpToMonth(11, this)">11月</div>
        <div class="bm-month" onclick="jumpToMonth(10, this)">10月</div>
        <div class="bm-month" onclick="jumpToMonth(9, this)">9月</div>
        <div class="bm-month" onclick="jumpToMonth(8, this)">8月</div>
        <div class="bm-month" onclick="jumpToMonth(7, this)">7月</div>
        <div class="bm-month" onclick="jumpToMonth(6, this)">6月</div>
        <div class="bm-month" onclick="jumpToMonth(5, this)">5月</div>
        <div class="bm-month" onclick="jumpToMonth(4, this)">4月</div>
        <div class="bm-month" onclick="jumpToMonth(3, this)">3月</div>
        <div class="bm-month" onclick="jumpToMonth(2, this)">2月</div>
        <div class="bm-month" onclick="jumpToMonth(1, this)">1月</div>
    </div>

    <div class="bookmarks-right">
        <div class="bm-add" onclick="createNewPage()" title="创建全新的一页">+ 新增记录</div>
    </div>

    <div class="bookmark-top" id="search-toggle" onclick="toggleSearch(event)">🔍 检索</div>
    <div class="search-modal" id="search-box">
        <div class="search-inner">
            <input type="text" id="search-input" placeholder="输入关键字..." onkeypress="if(event.key==='Enter') executeSearch()">
            <button class="search-action-btn" onclick="executeSearch()">检索</button>
        </div>
    </div>

    <div class="journal-cover" onclick="openJournalToLatest()">
        <div class="cover-title" id="display-cover-title">ECHO的日记</div>
        <div class="cover-hint">点击翻开最新记录</div>
    </div>

    <div class="journal-inner" id="journal-pages">
        <div class="page-left">
            <div class="close-book-btn" onclick="closeJournal()">❮ 合上</div>
            <div id="note-top" class="scrapbook-note" oncontextmenu="editNote(event, this)"></div>
            
            <div class="media-center">
                <div class="tape"></div>
                <input type="file" id="photo-upload-input" style="display: none;" accept="image/*" onchange="handlePhotoUpload(event)">
                <div class="polaroid-frame" onclick="document.getElementById('photo-upload-input').click()">
                    <div class="polaroid-image" id="display-photo">点击传图</div>
                </div>
                <div id="add-music-btn" class="add-music-btn" onclick="addMusic()">+ 🎵</div>
            </div>
            <div id="note-bottom" class="scrapbook-note" oncontextmenu="editNote(event, this)"></div>
        </div>

        <div id="music-player-widget" class="music-player-widget">
            <button class="close-music-btn" onclick="removeMusic()">✕</button>
            <div class="music-header">
                <input type="text" id="music-input-display" class="music-input" placeholder="输入音频直链(.mp3)..." oninput="autoSaveMusic()">
                <button class="upload-music-btn" onclick="document.getElementById('audio-upload-input').click()">📁</button>
                <input type="file" id="audio-upload-input" style="display: none;" accept="audio/*" onchange="handleAudioUpload(event)">
            </div>
            <div class="music-controls">
                <button class="play-btn" id="play-pause-btn" onclick="togglePlay()">▶</button>
                <span id="music-status" style="font-size: 10px; color: #888; margin-left: 5px;">就绪</span>
                <audio id="real-audio-player" style="display:none;" onended="resetPlayer()"></audio>
            </div>
        </div>

        <div class="page-right">
            <div class="page-header">
                <input type="text" id="display-date" class="seamless-input" style="width: 180px;" placeholder="输入日期..." oninput="autoSave()">
                <input type="text" id="display-weather" class="seamless-input" style="width: 60px; text-align: right; font-weight: normal; font-size: 13px;" placeholder="天气" oninput="autoSave()">
            </div>
            
            <div class="agent-box">
                <input type="text" id="display-agent-title" class="seamless-input" style="font-size: 11px; letter-spacing: 2px; margin-bottom: 5px; width: 100%; border-bottom: 1px solid rgba(0,0,0,0.1); border-radius: 0; padding-bottom: 5px;" placeholder="标题" oninput="autoSave()">
                <textarea id="display-agent-text" class="seamless-textarea" placeholder="在这里输入或粘贴正文内容..." oninput="autoSave()"></textarea>
            </div>
            
            <div class="section-title" style="margin-top:5px; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom:5px;">ALEC 想说</div>
            <div class="user-section-wrapper" id="user-entries-container"></div>
            
            <div class="page-controls">
                <div class="nav-btn" id="btn-prev" onclick="changePage(1)">❮ 往日</div>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div id="display-page-num" style="background: rgba(0,0,0,0.05); padding: 2px 8px; border-radius: 4px; font-family: monospace;"></div>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="delete-page-btn" onclick="deleteCurrentPage()" title="删除当前页">🗑️</div>
                    <div class="nav-btn disabled" id="btn-next" onclick="changePage(-1)">近期 ❯</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function checkPassword() {
        const input = document.getElementById('os-password');
        const lock = document.getElementById('lock-screen');
        if(input.value === '0309') { lock.style.opacity = '0'; setTimeout(() => { lock.style.visibility = 'hidden'; }, 600); } 
        else { input.classList.add('shake'); input.value = ''; input.placeholder = '密码错误'; setTimeout(() => { input.classList.remove('shake'); }, 400); }
    }
    function handlePasswordEnter(e) { if(e.key === 'Enter') checkPassword(); }

    function getEast8DateString() {
        const d = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Shanghai"}));
        return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
    }
    function getEast8Year() { return new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Shanghai"})).getFullYear(); }
    function getEast8Month() { return new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Shanghai"})).getMonth() + 1; }

    function generateBlankEntry(year, month, isPlaceholder = false) {
        return {
            month: month, date: `${year}年${month}月${isPlaceholder ? '1日' : new Date().getDate() + '日'}`, weather: "天气...", photo: "", 
            agentTitle: "", agentText: "", userEntries: [], 
            topNote: "点击右键编辑", bottomNote: "点击右键编辑", musicLink: "", musicIsLocalBase64: false
        };
    }

    // ================= 数据库升维：多重宇宙系统 (v2) =================
    let systemDB = JSON.parse(localStorage.getItem('alecSystemDB_v2'));
    if (!systemDB || systemDB.length === 0) {
        systemDB = [{
            id: 'j_' + Date.now(),
            name: "ECHO的日记",
            books: [{ year: getEast8Year(), entries: [ generateBlankEntry(getEast8Year(), getEast8Month()) ] }]
        }];
    }

    let activeJournalId = systemDB[0].id;
    let activeYear = systemDB[0].books[0].year;
    let currentIndex = 0;
    let audioPlayer = document.getElementById('real-audio-player');

    // 帮助函数：获取当前正在操作的那一阵列的日记
    function getActiveEntries() {
        let j = systemDB.find(x => x.id === activeJournalId);
        let b = j.books.find(x => x.year === activeYear);
        return b.entries;
    }

    function saveToDatabase() { localStorage.setItem('alecSystemDB_v2', JSON.stringify(systemDB)); }

    // ====== 左上角：图书馆渲染 ======
    function renderLibrary() {
        let html = '';
        systemDB.forEach(journal => {
            html += `<div class="lib-row">`;
            html += `<div class="lib-header"><span class="lib-icon">📖</span><input type="text" class="lib-name-input" value="${journal.name}" onchange="renameJournal('${journal.id}', this.value)"></div>`;
            html += `<div class="lib-books">`;
            journal.books.forEach(book => {
                let isActive = (journal.id === activeJournalId && book.year === activeYear) ? 'active-book' : '';
                html += `<div class="lib-book-badge ${isActive}" onclick="switchBook('${journal.id}', ${book.year})">${book.year}</div>`;
            });
            html += `<div class="lib-add-btn" onclick="addYear('${journal.id}')" title="添加新年份">+</div>`;
            html += `</div></div>`;
        });
        html += `<div class="lib-add-journal-btn" onclick="addJournal()">+ 添加新记录对象</div>`;
        document.getElementById('library-container').innerHTML = html;

        // 同步更新封面标题
        let activeJ = systemDB.find(x => x.id === activeJournalId);
        document.getElementById('display-cover-title').innerText = activeJ.name.toUpperCase();
        document.getElementById('display-bm-year').innerText = activeYear;
    }

    function renameJournal(id, newName) {
        let j = systemDB.find(x => x.id === id);
        if(j && newName.trim()) { j.name = newName.trim(); saveToDatabase(); renderLibrary(); }
    }

    function addJournal() {
        let newName = prompt("给新的日记本起个名字 (如: CHASE的日记):", "新日记");
        if(newName && newName.trim()) {
            let nId = 'j_' + Date.now();
            let nYear = getEast8Year();
            systemDB.push({
                id: nId, name: newName.trim(),
                books: [{ year: nYear, entries: [ generateBlankEntry(nYear, getEast8Month()) ] }]
            });
            saveToDatabase(); renderLibrary();
        }
    }

    function addYear(jId) {
        let j = systemDB.find(x => x.id === jId);
        let nYear = prompt("请输入要添加的年份 (如: 2027):", getEast8Year() + 1);
        if(nYear && !isNaN(nYear)) {
            nYear = parseInt(nYear);
            if(!j.books.find(b => b.year === nYear)) {
                j.books.push({ year: nYear, entries: [ generateBlankEntry(nYear, 1, true) ] });
                j.books.sort((a,b)=> b.year - a.year); // 年份倒序
                saveToDatabase(); renderLibrary();
            } else { alert("该年份已存在！"); }
        }
    }

    function switchBook(jId, year) {
        activeJournalId = jId;
        activeYear = year;
        currentIndex = 0; // 切书自动跳到最新
        renderLibrary();
        closeJournal(); // 切书时先合上，更有仪式感
    }

    // 初始化渲染侧边栏
    renderLibrary();

    // ================= 日记本操作核心 =================
    function autoSave() {
        let entries = getActiveEntries();
        entries[currentIndex].date = document.getElementById('display-date').value;
        entries[currentIndex].weather = document.getElementById('display-weather').value;
        entries[currentIndex].agentTitle = document.getElementById('display-agent-title').value;
        entries[currentIndex].agentText = document.getElementById('display-agent-text').value;
        let mMatch = entries[currentIndex].date.match(/(\d+)月/);
        if(mMatch) entries[currentIndex].month = parseInt(mMatch[1]);
        saveToDatabase(); updateMonthBookmark();
    }

    function createNewPage() {
        let entries = getActiveEntries();
        entries.unshift(generateBlankEntry(activeYear, getEast8Month()));
        saveToDatabase();
        currentIndex = 0; renderPage(0);
    }

    function deleteCurrentPage() {
        if(confirm("最高权限警告：确定彻底删除此页记录？不可恢复。")) {
            let entries = getActiveEntries();
            entries.splice(currentIndex, 1);
            if(entries.length === 0) { createNewPage(); } 
            else {
                if(currentIndex >= entries.length) currentIndex = entries.length - 1;
                saveToDatabase(); renderPage(currentIndex);
            }
        }
    }

    // 智能月份跳转 (涵盖自动展平日记本逻辑)
    function jumpToMonth(targetMonth, el) {
        if (!document.body.classList.contains('journal-opened')) {
            document.body.classList.add('journal-opened');
        }
        let entries = getActiveEntries();
        let foundIndex = entries.findIndex(e => e.month === targetMonth);
        if (foundIndex !== -1) {
            currentIndex = foundIndex; renderPage(currentIndex);
        } else {
            let blank = generateBlankEntry(activeYear, targetMonth, true);
            entries.push(blank);
            entries.sort((a, b) => (b.month || 0) - (a.month || 0)); // 按月倒序
            saveToDatabase();
            currentIndex = entries.findIndex(e => e === blank);
            renderPage(currentIndex);
        }
    }

    function updateMonthBookmark() {
        let entries = getActiveEntries();
        let currentMonth = entries[currentIndex].month;
        document.querySelectorAll('.bm-month').forEach(bm => {
            bm.classList.remove('active');
            if (parseInt(bm.innerText) === currentMonth) bm.classList.add('active');
        });
    }

    // 翻开跳转最新
    function openJournalToLatest() { document.body.classList.add('journal-opened'); currentIndex = 0; renderPage(0); }
    function closeJournal() { document.body.classList.remove('journal-opened'); }

    function renderPage(index) {
        let entries = getActiveEntries();
        const data = entries[index];
        document.getElementById('display-date').value = data.date;
        document.getElementById('display-weather').value = data.weather;
        document.getElementById('display-agent-title').value = data.agentTitle;
        document.getElementById('display-agent-text').value = data.agentText;
        
        const photoDiv = document.getElementById('display-photo');
        if(data.photo) { photoDiv.style.backgroundImage = `url(${data.photo})`; photoDiv.innerText = ""; } 
        else { photoDiv.style.backgroundImage = "none"; photoDiv.innerText = "点击传图"; }

        document.getElementById('display-page-num').innerText = `${entries.length - index} / ${entries.length}`;
        document.getElementById('note-top').innerText = data.topNote;
        document.getElementById('note-bottom').innerText = data.bottomNote;

        const playerWidget = document.getElementById('music-player-widget');
        const addBtn = document.getElementById('add-music-btn');
        resetPlayer(); 
        
        if (data.musicLink || data.musicIsLocalBase64) {
            addBtn.style.display = 'none'; playerWidget.style.display = 'flex';
            document.getElementById('music-input-display').value = data.musicIsLocalBase64 ? "[本地音频已加载]" : data.musicLink;
            playerWidget.style.top = '360px'; playerWidget.style.left = '140px';
            if(data.musicLink) audioPlayer.src = data.musicLink;
        } else { addBtn.style.display = 'flex'; playerWidget.style.display = 'none'; }

        renderUserEntries(data.userEntries);
        
        document.getElementById('btn-prev').classList.toggle('disabled', index === entries.length - 1);
        document.getElementById('btn-next').classList.toggle('disabled', index === 0);
        document.querySelectorAll('.draggable-sticker').forEach(s => s.remove());
        updateMonthBookmark();
    }

    // 图片上传
    function handlePhotoUpload(event) {
        const file = event.target.files[0];
        if (file) {
            if(file.size > 2 * 1024 * 1024) alert("提示：为防止浏览器缓存溢出，建议上传 2MB 以下的图片哦。");
            const reader = new FileReader();
            reader.onload = function(e) { getActiveEntries()[currentIndex].photo = e.target.result; saveToDatabase(); renderPage(currentIndex); }
            reader.readAsDataURL(file);
        }
    }

    // 音乐
    function addMusic() { getActiveEntries()[currentIndex].musicLink = "https://"; renderPage(currentIndex); }
    function removeMusic() { getActiveEntries()[currentIndex].musicLink = ""; getActiveEntries()[currentIndex].musicIsLocalBase64 = false; saveToDatabase(); resetPlayer(); renderPage(currentIndex); }
    function autoSaveMusic() { const val = document.getElementById('music-input-display').value; getActiveEntries()[currentIndex].musicLink = val; getActiveEntries()[currentIndex].musicIsLocalBase64 = false; saveToDatabase(); audioPlayer.src = val; }
    function handleAudioUpload(event) {
        const file = event.target.files[0];
        if (file) { const reader = new FileReader(); reader.onload = function(e) { getActiveEntries()[currentIndex].musicLink = e.target.result; getActiveEntries()[currentIndex].musicIsLocalBase64 = true; saveToDatabase(); renderPage(currentIndex); }; reader.readAsDataURL(file); }
    }
    function togglePlay() {
        if(audioPlayer.paused) {
            if(!audioPlayer.src) { alert("请上传本地音乐或输入纯音频(.mp3)直链。"); return; }
            audioPlayer.play().then(() => { document.getElementById('play-pause-btn').innerText = '||'; document.getElementById('music-status').innerText = '播放中'; }).catch(e => alert("无法播放，请尝试本地文件。"));
        } else { audioPlayer.pause(); document.getElementById('play-pause-btn').innerText = '▶'; document.getElementById('music-status').innerText = '已暂停'; }
    }
    function resetPlayer() { audioPlayer.pause(); audioPlayer.currentTime = 0; document.getElementById('play-pause-btn').innerText = '▶'; document.getElementById('music-status').innerText = '就绪';}

    // 用户封存
    function renderUserEntries(entries) {
        const container = document.getElementById('user-entries-container');
        let html = '';
        entries.forEach(entry => { html += `<div class="sealed-entry"><div class="sealed-text">${entry.text}</div><div class="sealed-time">${entry.timestamp} 封存</div></div>`; });
        html += `<textarea class="user-input" id="current-user-input" placeholder="随时记录你的想法..."></textarea><button class="save-btn" onclick="saveUserText()">封存</button>`;
        container.innerHTML = html; container.scrollTop = container.scrollHeight;
    }
    function saveUserText() {
        const input = document.getElementById('current-user-input');
        const text = input.value.trim(); if(!text) return;
        const d = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Shanghai"}));
        const timeStr = `2026-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        getActiveEntries()[currentIndex].userEntries.push({ text: text, timestamp: timeStr });
        saveToDatabase(); renderPage(currentIndex);
    }

    // 右键编辑手账备注
    function editNote(e, el) {
        e.preventDefault(); const textarea = document.createElement('textarea'); textarea.className = 'note-edit-area'; textarea.value = el.innerText;
        textarea.onblur = function() { const val = this.value.trim() || '右键编辑'; el.innerText = val; el.style.display = 'block'; if(el.id === 'note-top') getActiveEntries()[currentIndex].topNote = val; else getActiveEntries()[currentIndex].bottomNote = val; saveToDatabase(); this.remove(); };
        textarea.onkeydown = function(ev) { if(ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); this.blur(); } };
        el.style.display = 'none'; el.parentNode.insertBefore(textarea, el); textarea.focus();
    }

    function changePage(dir) { let entries = getActiveEntries(); let n = currentIndex + dir; if(n>=0 && n<entries.length){ currentIndex = n; renderPage(n); } }

    // 拖拽
    function makeDraggable(elmnt) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0; elmnt.onmousedown = dragMouseDown;
        function dragMouseDown(e) { if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return; e.preventDefault(); pos3 = e.clientX; pos4 = e.clientY; document.onmouseup = closeDragElement; document.onmousemove = elementDrag; document.querySelectorAll('.draggable-sticker, .music-player-widget').forEach(s => s.style.zIndex = 45); elmnt.style.zIndex = 50; }
        function elementDrag(e) { e.preventDefault(); pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY; pos3 = e.clientX; pos4 = e.clientY; elmnt.style.top = (elmnt.offsetTop - pos2) + "px"; elmnt.style.left = (elmnt.offsetLeft - pos1) + "px"; }
        function closeDragElement() { document.onmouseup = null; document.onmousemove = null; }
    }
    makeDraggable(document.getElementById('music-player-widget'));

    // 贴纸逻辑
    function toggleTray() { const t = document.getElementById('sticker-tray'); t.style.display = t.style.display === 'flex' ? 'none' : 'flex'; }
    function spawnSticker(content) { 
        const s = document.createElement('div'); s.className = 'draggable-sticker'; s.style.left = '200px'; s.style.top = '250px'; 
        s.innerHTML = `<div class="sticker-content" style="transform: scale(1) rotate(0deg);">${content}</div><div class="sticker-ctrls"><button class="s-ctrl-btn" onclick="modifySticker(this, 'rotL')">↺</button><button class="s-ctrl-btn" onclick="modifySticker(this, 'rotR')">↻</button><button class="s-ctrl-btn" onclick="modifySticker(this, 'up')">+</button><button class="s-ctrl-btn" onclick="modifySticker(this, 'down')">-</button><button class="s-ctrl-btn s-ctrl-del" onclick="this.closest('.draggable-sticker').remove()">×</button></div>`; 
        document.getElementById('journal-pages').appendChild(s); makeDraggable(s); toggleTray(); 
    }
    function modifySticker(btn, action) { const c = btn.closest('.draggable-sticker').querySelector('.sticker-content'); let s = parseFloat(c.style.transform.match(/scale\(([^)]+)\)/)[1]); let r = parseInt(c.style.transform.match(/rotate\(([^)]+)deg\)/)[1]); if(action==='rotL') r-=15; if(action==='rotR') r+=15; if(action==='up') s+=0.2; if(action==='down') s=Math.max(0.5, s-0.2); c.style.transform = `scale(${s}) rotate(${r}deg)`; }

    // 检索系统
    function toggleSearch(e) { e.stopPropagation(); const b = document.getElementById('search-box'); b.style.display = b.style.display === 'block' ? 'none' : 'block'; document.getElementById('search-input').focus(); }
    document.addEventListener('click', e => { const b = document.getElementById('search-box'); if(b.style.display==='block' && !b.contains(e.target) && e.target.id!=='search-toggle') b.style.display='none'; });
    function executeSearch() { 
        const query = document.getElementById('search-input').value.trim();
        if(!query) return;
        let entries = getActiveEntries();
        let found = -1;
        for(let i=0; i<entries.length; i++) {
            const d = entries[i];
            const content = (d.date + d.agentText + d.topNote + d.bottomNote + d.userEntries.map(u=>u.text).join('')).toLowerCase();
            if(content.includes(query.toLowerCase())) { found = i; break; }
        }
        if(found !== -1) { currentIndex = found; renderPage(found); document.getElementById('search-box').style.display='none'; document.getElementById('search-input').value = ''; } 
        else { alert(`未在当前日记本中找到包含 "${query}" 的记录。`); }
    }
</script>

</body>
</html>
